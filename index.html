<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reserve Schedule Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <link rel="stylesheet" href="./shared.css">
    <style>
        html,
        body {
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('350.jpg') center / cover no-repeat;
            opacity: 0.10;
            filter: blur(3px) grayscale(40%);
            z-index: -1;
            transform: scale(1.04);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 2rem 0;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        .tool-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 420px;
        }

        .tool-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: border-color 0.15s, background 0.15s;
        }

        .tool-card:hover {
            border-color: #555;
            background: #25262a;
        }

        .tool-card .icon {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .tool-card .info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .tool-card .name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .tool-card .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .login-card p {
            margin: 0 0 0.25rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .login-card input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: #111;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        .login-card input[type="email"]:focus {
            border-color: #555;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: #2a2b2e;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
        }

        .btn:hover {
            background: #35363a;
            border-color: #555;
        }

        #auth-msg {
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.2em;
        }

        #user-bar {
            font-size: 0.82rem;
            color: var(--text-muted);
            text-align: center;
        }

        #user-bar button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            font-size: inherit;
            padding: 0;
            margin-left: 0.4rem;
        }

        #user-bar button:hover {
            color: var(--text-main);
        }

        .hidden {
            display: none !important;
        }

        /* ── Status Section ── */
        #status-section {
            margin-top: 1.5rem;
            width: 100%;
            max-width: 420px;
        }

        .status-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .status-label {
            color: var(--text-muted);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 99px;
            border: 1px solid transparent;
        }

        .status-pill.checking {
            color: var(--text-muted);
            border-color: var(--border);
        }

        .status-pill.up {
            color: #4ade80;
            background: rgba(21, 128, 61, 0.15);
            border-color: rgba(21, 128, 61, 0.4);
        }

        .status-pill.down {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-dot.pulse {
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .status-footer {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
            padding-top: 0.25rem;
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>
    <h1>Reserve Schedule Tools</h1>

    <div class="tool-grid">

        <div id="login-view" class="login-card hidden">
            <p>Sign in to sync your schedules across devices. No password — we'll email you a magic link.</p>
            <p>You can proceed to the apps below without logging in. No data will be saved.</p>
            <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
            <button class="btn" onclick="sendMagicLink()">Send Magic Link</button>
            <div id="auth-msg"></div>
        </div>

        <div id="user-bar" class="hidden">
            <span id="user-email"></span>
            <button onclick="signOut()">Sign Out</button>
        </div>

        <a class="tool-card" href="./pbs/">
            <span class="icon">📅</span>
            <div class="info">
                <span class="name">PBS Planner</span>
                <span class="desc">Plan your next reserve month</span>
            </div>
        </a>

        <a class="tool-card" href="./pcs/">
            <span class="icon">✈️</span>
            <div class="info">
                <span class="name">PCS Planner</span>
                <span class="desc">PCS Strategery</span>
            </div>
        </a>

    </div>

    <div id="status-section">
        <div class="status-card">
            <div class="status-row">
                <span class="status-label">App</span>
                <span class="status-pill checking" id="pill-ghp">
                    <span class="status-dot pulse"></span>checking
                </span>
            </div>
            <div class="status-row">
                <span class="status-label">Database</span>
                <span class="status-pill checking" id="pill-supa">
                    <span class="status-dot pulse"></span>checking
                </span>
            </div>
            <div class="status-footer" id="status-time"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://sowczbjrrqazotbqpzrr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-wiDJ-bZPss16vIOL_HLrA_L5SJfuyH';
        const _supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function renderAuth(session) {
            const loggedIn = !!session;
            document.getElementById('login-view').classList.toggle('hidden', loggedIn);
            document.getElementById('user-bar').classList.toggle('hidden', !loggedIn);
            if (loggedIn) document.getElementById('user-email').textContent = session.user.email;
        }

        _supa.auth.onAuthStateChange((_event, session) => renderAuth(session));
        _supa.auth.getSession().then(({ data: { session } }) => renderAuth(session));

        async function sendMagicLink() {
            const emailEl = document.getElementById('auth-email');
            const msgEl = document.getElementById('auth-msg');
            const email = emailEl.value.trim();
            if (!email) { msgEl.textContent = 'Enter an email address.'; return; }
            msgEl.textContent = 'Sending…';
            const { error } = await _supa.auth.signInWithOtp({ email });
            msgEl.textContent = error ? 'Error: ' + error.message : 'Magic link sent! Check your email.';
        }

        async function signOut() { await _supa.auth.signOut(); }

        // ── Status checks ──
        function setPill(id, state) {
            const pill = document.getElementById(id);
            pill.className = 'status-pill ' + state;
            const dot = document.createElement('span');
            dot.className = 'status-dot';
            const label = state === 'checking' ? 'checking' : state === 'up' ? 'operational' : 'unavailable';
            pill.innerHTML = '';
            pill.appendChild(dot);
            pill.appendChild(document.createTextNode(label));
        }

        function imgCheck(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = url + '?nc=' + Date.now();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                setTimeout(() => resolve(false), 6000);
            });
        }

        async function checkGHP() {
            const ok = await imgCheck('https://reserve.blueskiestailwinds.com/favicon.png');
            setPill('pill-ghp', ok ? 'up' : 'down');
        }

        async function checkSupabase() {
            try {
                const { error } = await _supa
                    .from('month_instances')
                    .select('id')
                    .limit(1);
                setPill('pill-supa', error ? 'down' : 'up');
            } catch {
                setPill('pill-supa', 'down');
            }
        }

        async function runChecks() {
            setPill('pill-ghp', 'checking');
            setPill('pill-supa', 'checking');
            await Promise.all([checkGHP(), checkSupabase()]);
            const now = new Date();
            document.getElementById('status-time').textContent =
                'Last checked: ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Run on page load
        runChecks();
    </script>
</body>

</html>
