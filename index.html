<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reserve Schedule Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <link rel="stylesheet" href="./shared.css">
    <style>
        html,
        body {
            min-height: 100vh;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            isolation: isolate;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('350.jpg') center / cover no-repeat;
            opacity: 0.10;
            filter: blur(3px) grayscale(40%);
            z-index: -1;
            transform: scale(1.04);
            /* hide blur edges */
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 2rem 0;
            color: var(--text-main);
            letter-spacing: 0.02em;
        }

        .tool-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 420px;
        }

        .tool-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-decoration: none;
            color: var(--text-main);
            transition: border-color 0.15s, background 0.15s;
        }

        .tool-card:hover {
            border-color: #555;
            background: #25262a;
        }

        .tool-card .icon {
            font-size: 2rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .tool-card .info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .tool-card .name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .tool-card .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .login-card p {
            margin: 0 0 0.25rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .login-card input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: #111;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        .login-card input[type="email"]:focus {
            border-color: #555;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: #2a2b2e;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
        }

        .btn:hover {
            background: #35363a;
            border-color: #555;
        }

        #auth-msg {
            font-size: 0.82rem;
            color: var(--text-muted);
            min-height: 1.2em;
        }

        #user-bar {
            font-size: 0.82rem;
            color: var(--text-muted);
            text-align: center;
        }

        #user-bar button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            font-size: inherit;
            padding: 0;
            margin-left: 0.4rem;
        }

        #user-bar button:hover {
            color: var(--text-main);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <h1>Reserve Schedule Tools</h1>

    <!-- Tool grid — always visible -->
    <div class="tool-grid">

        <!-- Login card — shown when signed out -->
        <div id="login-view" class="login-card hidden">
            <p>Sign in to sync your schedules across devices. No password — we'll email you a magic link.</p>
            <p>You can proceed to the apps below without logging in. No data will be saved.</p>
            <input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email">
            <button class="btn" onclick="sendMagicLink()">Send Magic Link</button>
            <div id="auth-msg"></div>
        </div>

        <!-- User bar — shown when signed in -->
        <div id="user-bar" class="hidden">
            <span id="user-email"></span>
            <button onclick="signOut()">Sign Out</button>
        </div>

        <a class="tool-card" href="/pbs/">
            <span class="icon">📅</span>
            <div class="info">
                <span class="name">PBS Planner</span>
                <span class="desc">Plan your next reserve month</span>
            </div>
        </a>

        <a class="tool-card" href="/pcs/">
            <span class="icon">✈️</span>
            <div class="info">
                <span class="name">PCS Planner</span>
                <span class="desc">PCS Strategery</span>
            </div>
        </a>
    </div>

    <script>
        const SUPABASE_URL = 'https://sowczbjrrqazotbqpzrr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-wiDJ-bZPss16vIOL_HLrA_L5SJfuyH';
        const _supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function renderAuth(session) {
            const loggedIn = !!session;
            document.getElementById('login-view').classList.toggle('hidden', loggedIn);
            document.getElementById('user-bar').classList.toggle('hidden', !loggedIn);
            if (loggedIn) {
                document.getElementById('user-email').textContent = session.user.email;
            }
        }

        _supa.auth.onAuthStateChange((_event, session) => renderAuth(session));

        _supa.auth.getSession().then(({ data: { session } }) => renderAuth(session));

        async function sendMagicLink() {
            const emailEl = document.getElementById('auth-email');
            const msgEl = document.getElementById('auth-msg');
            const email = emailEl.value.trim();
            if (!email) { msgEl.textContent = 'Enter an email address.'; return; }
            msgEl.textContent = 'Sending…';
            const { error } = await _supa.auth.signInWithOtp({ email });
            msgEl.textContent = error ? 'Error: ' + error.message : 'Magic link sent! Check your email.';
        }

        async function signOut() {
            await _supa.auth.signOut();
        }
    </script>
</body>

</html>
